<form method="post">
    {% csrf_token %}
    
    {{ form.nom.label }} {{ form.nom }}
    {{ form.abreviation.label }} {{ form.abreviation }}
    {{ form.type.label }} {{ form.type }}
    {{ form.local.label }} {{ form.local }}
    {{ form.projet.label }} {{ form.projet }}

    <h3>Équipements</h3>

    <table class="table" id="equipements-table">
        <thead>
            <tr>
                <th>Ajouter</th>
                <th>Nom</th>
                <th>Groupe</th>
                <th>Sous-groupe</th>
                <th>Qté</th>
                <th>Prix</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <button type="submit">Créer</button>
</form>

<script>
document.getElementById('id_type').addEventListener('change', function() {
    let typeId = this.value;

    fetch(`/ajax/equipements/?type_id=${typeId}`)
        .then(response => response.json())
        .then(data => {
            let tbody = document.querySelector('#equipements-table tbody');
            tbody.innerHTML = '';

            data.equipements.forEach((e, index) => {
                let row = `
                    <tr>
                        <td><input type="checkbox" name="add-${index}-ajouter"></td>
                        <td>${e.nom}</td>
                        <td>${e.groupe}</td>
                        <td>${e.sous_groupe}</td>
                        <td>
                            <input type="number" step="0.01" name="add-${index}-qte" class="form-control">
                        </td>
                        <td>${e.prix}</td>
                        <input type="hidden" name="add-${index}-equipement_id" value="${e.id}">
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        });
});
</script>
